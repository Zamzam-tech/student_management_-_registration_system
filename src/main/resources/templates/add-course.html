<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Add New Course</h2>
    <form th:action="@{/courses/save}" th:object="${course}" method="post">
        <div class="mb-3">
            <label>Course Name</label>
            <input type="text" th:field="*{courseName}" class="form-control" />
        </div>
        <div class="mb-3">
            <label>Course Code</label>
            <input type="text" th:field="*{courseCode}" class="form-control" />
        </div>
        <div class="mb-3">
            <label>Lecturer</label>
            <input type="text" th:field="*{lecturer}" class="form-control" />
        </div>
        <div class="mb-3">
            <label>Credits</label>
            <input type="number" th:field="*{credits}" class="form-control" />
        </div>
        <button type="submit" class="btn btn-success">Save Course</button>
    </form>
</body>
</html>
