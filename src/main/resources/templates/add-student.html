<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h2 th:text="${student.id == null} ? 'Add New Student' : 'Update Student'"></h2>
        <form th:action="@{/students/save}" th:object="${student}" method="post">
            <input type="hidden" th:field="*{id}" />
            
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Program</label>
                <input type="text" th:field="*{program}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Year of Study</label>
                <input type="number" th:field="*{yearOfStudy}" class="form-control" min="1" max="5" required />
            </div>
            
            <button type="submit" class="btn btn-success w-100">Save Student</button>
            <a href="/students" class="btn btn-link w-100 mt-2 text-decoration-none">Cancel</a>
        </form>
    </div>
</body>
</html>
