<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>University Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 15px; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Student Portal</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/students">Students</a>
            <a class="nav-link" href="/courses">Courses</a>
            <a class="nav-link btn btn-primary text-white ms-lg-3" href="/register">Register Now</a>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">University Overview Dashboard</h2>
    
    <div class="row text-center">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-4 shadow">
                <h3>Total Students</h3>
                <h1 th:text="${totalStudents}">0</h1>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card bg-success text-white p-4 shadow">
                <h3>Total Courses</h3>
                <h1 th:text="${totalCourses}">0</h1>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card bg-warning text-dark p-4 shadow">
                <h3>Total Registrations</h3>
                <h1 th:text="${totalRegistrations}">0</h1>
            </div>
        </div>
    </div>

    <hr class="my-5">
    
    <div class="text-center">
        <h4>Quick Actions</h4>
        <a href="/students/new" class="btn btn-outline-dark m-2">Add New Student</a>
        <a href="/courses/new" class="btn btn-outline-dark m-2">Add New Course</a>
    </div>
</div>

</body>
</html>
