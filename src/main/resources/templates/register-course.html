<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
        <h2>Register for a Course</h2>
        
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="@{/register/save}" th:object="${registration}" method="post">
            <div class="mb-3">
                <label class="form-label">Select Student</label>
                <select th:field="*{student.id}" class="form-select" required>
                    <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Select Course</label>
                <select th:field="*{course.id}" class="form-select" required>
                    <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseName} + ' (' + ${c.courseCode} + ')'"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="text" th:field="*{semester}" class="form-control" placeholder="e.g. Fall 2026" required />
            </div>

            <button type="submit" class="btn btn-primary w-100">Confirm Registration</button>
        </form>
    </div>
</body>
</html>
